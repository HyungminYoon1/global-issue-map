{% extends "base.html" %}
{% block title %}{{ label }} - Global Issue Map{% endblock %}

{% block content %}
<div class="category-layout">
  <div class="category-map">
    <div class="continent-filter" id="continentFilter"></div>
    <div id="map" style="width:100%;height:100%;"></div>
  </div>

  <div class="category-panel" id="listPanel">
    <div class="panel-header">
      <h2 data-i18n="cat_{{ category }}">{{ label }}</h2>
      <div class="article-count" id="articleCount"></div>
    </div>
    <div class="article-list" id="articleList"></div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailTitle"></h3>
      <button class="detail-close" id="detailClose">&times;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
    <button class="save-btn" id="saveBtn" data-i18n="save_article">기사 저장</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const PAGE_CATEGORY = "{{ category }}";
</script>
<script src="/static/js/category.js"></script>
{% endblock %}
