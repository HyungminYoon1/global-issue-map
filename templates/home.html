{% extends "base.html" %}
{% block title %}Global Issue Map{% endblock %}

{% block content %}
<div class="map-container" style="height:60vh;">
  <div class="continent-filter" id="continentFilter"></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="키워드 검색...">
    <button id="searchBtn">검색</button>
  </div>
  <div id="map" style="width:100%;height:100%;"></div>
</div>

<section class="headlines-section">
  <h2>주요 뉴스</h2>
  <div class="headline-grid" id="headlineGrid"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/home.js"></script>
{% endblock %}
